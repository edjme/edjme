  <rect x="54" y="42" width="1092" height="276" rx="18" stroke="url(#neon)" stroke-width="2" opacity="0.62"/>
  <path d="M54 88V60C54 50.0589 62.0589 42 72 42H110" stroke="#00F7FF" stroke-width="5" filter="url(#glowCyan)"/>
  <path d="M1090 318H1128C1137.94 318 1146 309.941 1146 300V264" stroke="#FF2BD6" stroke-width="5" filter="url(#glowPink)"/>

  <text x="82" y="102" fill="#00F7FF" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
