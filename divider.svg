<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#05010D"/>
      <stop offset="0.52" stop-color="#0B1023"/>
      <stop offset="1" stop-color="#030A12"/>
    </linearGradient>
    <linearGradient id="neon" x1="180" y1="95" x2="1020" y2="270" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00F7FF"/>
      <stop offset="0.48" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#FF2BD6"/>
    </linearGradient>
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowPink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#1F2A44" stroke-width="1" opacity="0.38"/>
    </pattern>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#FFFFFF" opacity="0.035"/>
    </pattern>
  </defs>

  <rect width="1200" height="360" rx="26" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="26" fill="url(#grid)"/>
  <rect width="1200" height="360" rx="26" fill="url(#scan)"/>

  <path d="M0 280L290 188L560 245L885 110L1200 170" stroke="#00F7FF" stroke-width="2" opacity="0.24"/>
