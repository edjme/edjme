    <circle cx="425" cy="95" r="4" fill="#00F7FF"/>
    <path d="M795 65H1035L1080 110H1150" stroke="#FF2BD6" stroke-width="2"/>
    <circle cx="795" cy="65" r="4" fill="#FF2BD6"/>
    <circle cx="1150" cy="110" r="5" fill="#FF2BD6" filter="url(#glowPink)"/>
  </g>

  <g opacity="0.48">
